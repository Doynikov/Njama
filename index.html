<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <style>
    body {
      background-color: black;
    }

    #canvas-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      background-image: url('assets/images/bg.jpg');
      background-size: contain;
    }
  </style>
</head>

<body>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="1300" height="731"></canvas>
  </div>
  <script type="text/javascript">

    class Events {
      constructor() {
        this.keyPress = false;
        this.keyUp = false;
        this.keyLeft = false;
        this.keyRight = false;
        this.click = false;
        this.x = 0;
        this.y = 0;
      }

      handleClick = (e) => {
        this.click = true;
        this.x = e.x - game.canvas.offsetLeft;
        this.y = e.y - game.canvas.offsetTop;
      }

      handleKeyDown = (e) => {
        this.keyPress = true
        const code = e.keyCode;
        switch (code) {
          case 38:
            if (!nyama.isFall) {
              this.keyUp = true;
            }
            break;
          case 37:
            this.keyLeft = true;
            break;
          case 39:
            this.keyRight = true;
            break;
        }
      }

      handleKeyUp = (e) => {
        const code = e.keyCode;
        switch (code) {
          case 38:
            this.keyUp = false;
            break;
          case 37:
            this.keyLeft = false;
            break;
          case 39:
            this.keyRight = false;
            break;
        }
      }
    }


    class Sprite {
      constructor() {
        this.x = 0;
        this.y = 0;
        this.sprite = null;
        this.width = 0;
        this.height = 0;
      }

      get bottom() {
        return this.y + this.height;
      }
      
      get right() {
        return this.x + this.width;
      }

      toBottomScreen = () => {
        this.y = game.height_default - this.height;
      }
      toRightScreen = () => {
        this.x = game.width_default - this.width;
      }
      toLeftScreen = () => {
        this.x = 0;
      }
    }



    class Nyama extends Sprite {
      constructor() {
        super();
        this.name = 'nyama';
        this.sprite = game.images[this.name].sprite;
        this.width = this.sprite.width;
        this.height = this.sprite.height;
        this.x = game.width_default / 2;
        this.y = game.height_default - this.height;
        this.step_go = 10;
        this.step_jump = 5;
        this.step_fall = 20
        this.step_fly = 20
        this.direct = 'left';
        this.isJump = false;
        this.isFall = false;
        this.isFallDie = false;
        this.isFly_left = false
        this.isFly_right = false
        this.is_eat_good = false;
        this.is_eat_bad = false;
        this.is_brick = false;
        this.is_bang = false;
        this.is_active = true;
        this.jump_delay_counter = 0;
        this.eat_good_delay_counter = 0;
        this.eat_bad_delay_counter = 0;
        this.brick_delay_counter = 0;
        this.bang_delay_counter = 0;
        this.fly_delay_counter = 0;

      }

      moveLeft = () => {
        if (!this.is_active) return;
        this.direct = 'left'
        if (this.x > 0) {
          this.x -= this.step_go;
        }
      }

      moveRight = () => {
        if (!this.is_active) return;
        this.direct = 'right'
        if (this.right < game.width_default) {
          this.x += this.step_go;
        } else {
          this.toRightScreen();
        }
      }

      Jump = () => {
        if (!this.is_active) return;
        if (this.isFall) return;
        this.jump_delay_counter++

        if (!this.isJump) {
          this.isJump = true;
          this.name = 'nyama_press';
          this.sprite = game.images[this.name].sprite;
        }
        if (this.jump_delay_counter > 10) {

          this.name = 'nyama_jump';
          this.sprite = game.images[this.name].sprite;
          if (this.y > 0) {
            this.y -= this.step_jump;
          } else {
            this.isFall = true
            this.isFallDie = true
            this.jump_delay_counter = 0
            events.keyUp = false
            this.name = 'nyama_die_up_star';
            this.sprite = game.images[this.name].sprite;
            // game.sounds[6].sound.play()

          }
        }
      }

      moveUp = () => {
        if (this.isFall) return;
        this.Jump()
        /*
        this.isJump = true;
          
            if (this.y > 0) {
              this.y -= this.step_jump;
              this.name = 'nyama_jump';
              this.sprite = game.images[this.name].sprite;
            } else {
              this.isFall
              events.keyUp = false
              this.name = 'nyama';
              this.sprite = game.images[this.name].sprite;
          }
              */

      }

      fall = () => { 
        if (!this.is_active) return
        this.isFall = true
        this.jump_delay_counter = 0
        if (this.y < game.height_default - this.height) {
          this.y += this.step_fall;

        } else {
          this.isJump = false
          this.set_normal();
          game.sounds[6].sound.pause()
          game.sounds[6].sound.currentTime = 0
          this.isFall = false
          this.y = game.height_default - this.height;
          if (this.isFallDie) {
            game.live_counter -= 0.5;
            this.isFallDie = false;
          }

        }
      }

      update = () => {
        if (game.isGameStop) return;
        game.ctx.save();
        if (nyama.direct === 'right') {
          game.ctx.translate(this.x * game.ks + this.width * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks * -1, game.ks);
        } else {
          game.ctx.translate(this.x * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks, game.ks);
        }
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore();
      }

      set_normal = () => {
        this.name = 'nyama'
        this.sprite = game.images[this.name].sprite;
      }

      eat_good = () => {
        this.eat_good_delay_counter++;
        if (!this.is_eat_good) {
          this.is_eat_good = true;
          this.name = 'nyama_njam';
          this.sprite = game.images[this.name].sprite;
          game.sounds[4].sound.play()
        }
        if (this.eat_good_delay_counter > 300) {
          this.is_eat_good = false;
          game.live_counter += 0.5
          this.eat_good_delay_counter = 0;
          this.set_normal()
        }

      }

      eat_bad = () => {
        this.eat_bad_delay_counter++;
        if (!this.is_eat_bad) {
          this.is_eat_bad = true;
          this.name = 'nyama_red';
          this.sprite = game.images[this.name].sprite;
          game.sounds[3].sound.play()
        }
        if (this.eat_bad_delay_counter > 50) {
          this.is_eat_bad = false;
          game.live_counter -= 0.5
          this.eat_bad_delay_counter = 0;
          this.set_normal()
        }
      }

      brick = () => {
        this.brick_delay_counter++;
        if (!this.is_brick) {
          this.is_brick = true;
          this.name = 'nyama_down_star';
          this.sprite = game.images[this.name].sprite;
          game.sounds[5].sound.play()
        }
        if (this.brick_delay_counter > 50) {
          this.is_brick = false;
          game.live_counter -= 0.5
          this.brick_delay_counter = 0;
          this.set_normal()
        }
      }

      bang = () => {
        this.bang_delay_counter++;
        if (!this.is_bang) {
          this.is_active = false
          this.is_bang = true;
          this.name = 'bang_image';
          this.sprite = game.images[this.name].sprite;
          game.sounds[0].sound.play()
        }
        if (this.bang_delay_counter > 20) {
          this.name = 'nyama_bang';
          this.sprite = game.images[this.name].sprite;
          if (this.bang_delay_counter > 30) {
            this.y = game.height_default - this.height - 2;
            this.name = 'nyama_die';
            this.sprite = game.images[this.name].sprite;
            if (this.bang_delay_counter > 300) {
              this.is_bang = false;
              this.is_active = true
              game.live_counter--
              this.set_normal();
              this.bang_delay_counter = 0;
            }
          }
        }
      }

      bang_fly_left = () => {
        if (this.x > 0) {
          game.sounds[1].sound.play()
          this.is_active = false
          this.y -= this.step_fly * 0.5
          this.x -= this.step_fly
        } else {
          if (!this.is_wall_left) {
            this.direct = 'left'
            game.sounds[1].sound.pause()
            game.sounds[1].sound.currentTime = 0
            game.sounds[2].sound.play()
            this.is_wall_left = true
            this.toLeftScreen();
            this.name = 'nyama_wall_left';
            this.sprite = game.images[this.name].sprite;
          }
          if (this.bottom < game.height_default) {
            game.sounds[1].sound.pause()
            game.sounds[1].sound.currentTime = 0
            this.y += 5;
          } else {
            this.isFly_left = false;
            this.is_wall_left = false;
            this.is_active = true
            game.live_counter -= 0.5
            this.set_normal();
            this.toBottomScreen();
          }
        }
      }

      bang_fly_right = () => {
        if (this.right < game.width_default) {
          game.sounds[1].sound.play()
          this.is_active = false
          this.y -= this.step_fly * 0.5
          this.x += this.step_fly
        } else {
          if (!this.is_wall_right) {
            this.toRightScreen();
            this.direct = 'left'
            game.sounds[1].sound.pause()
            game.sounds[1].sound.currentTime = 0
            game.sounds[2].sound.play()
            this.is_wall_right = true
            this.name = 'nyama_wall_right';
            this.sprite = game.images[this.name].sprite;
          }
          if (this.bottom < game.height_default) {
            this.y += 5;
          } else {
            this.isFly_right = false;
            this.is_wall_right = false;
            this.is_active = true
            game.live_counter -= 0.5
            this.set_normal();
            this.toBottomScreen();
          }
        }
      }
    }

    class Rat extends Sprite {
      constructor() {
        super();
        this.name = 'rat_image_l'
        this.sprite = game.images[this.name].sprite
        this.step_go = 5
        this.direct = 'right'
        this.isActive = true
        this.isEat = false
        this.height = this.sprite.height
        this.width = this.sprite.width
        this.toBottomScreen()
        this.x = 0
        this.step_counter = 0;
        this.step_counter_max = 15;
        this.end_path = game.width_default
        this.eat_counter = 0;
      }

      eat = () => {
        console.log('eat')
        this.eat_counter ++
        nyama.is_active = false;
        nyama.toBottomScreen();
        if (this.eat_counter === 1) {
          nyama.name = 'nyama_blood_1'
          nyama.sprite = game.images[nyama.name].sprite
        } else if (this.eat_counter === 20) {
          nyama.name = 'nyama_blood_2'
          nyama.sprite = game.images[nyama.name].sprite
        } else if (this.eat_counter === 50) {
          nyama.y = -200 
          this.eat_counter = 0
          this.isEat = false
          game.live_counter -= 1
          setTimeout(() => {
            nyama.toBottomScreen()
            nyama.set_normal()
            nyama.is_active = true
          }, 2000)
          /*if (this.direct === 'right') {
            nyama.x += 200
          } else {
            nyama.x -= 200
          }*/
        }
      }

      move_rat = () => {
        if (!this.isActive) return;
        this.step_counter++
        if (this.step_counter === this.step_counter_max) {
          this.step_counter = 0
          if (this.name === 'rat_image_l') {
            this.name = 'rat_image_r'
          } else {
            this.name = 'rat_image_l'
          }
          this.sprite = game.images[this.name].sprite
        }
        
        if (this.direct === 'right') {
          if (
            this.right < this.end_path // если крыса не вышла за конец экрана
            && ((nyama.x - this.x) > -250 || nyama.bottom < game.height_default - 60) // если крыса правее не далее 250 или няма подпрыгнул
            ) 
          {
            this.x += this.step_go;
            if (this.right - nyama.x > 40 && this.right - nyama.x < 100 && nyama.bottom > game.height_default - 60) {
              console.log(this.right, nyama.x, 'right')
              this.isEat = true
              return;
            }
          } else if( nyama.right < this.x || !nyama.is_active) { // повернем крысу только если няма слева
            this.direct = 'left'
            this.end_path = 0
            if ((this.x - this.end_path) < 100) { // если расстояние от крысы до конца пути меньше 100 увеличим это расстояние до 300
              this.end_path = this.x - 300
            }
          }
        } else {
          if (
            this.x > 0 // если крыса не вышла за начало экрана
            && (this.x - nyama.right > -250 || nyama.bottom < game.height_default - 60)  // если крыса левее не далее 250 или няма подпрыгнул
          ) 
          {
            this.x -= this.step_go;
            if (this.x - nyama.right < -40 && this.x - nyama.right > -100 && nyama.bottom > game.height_default - 60) {
              console.log(this.x, nyama.right, 'left')
              this.isEat = true
              return;
            }
          } else if (this.right < nyama.x || !nyama.is_active) { // повернем крысу только если няма справа
            this.direct = 'right'
            this.end_path = game.width_default
            if ((this.end_path - this.x) < 100) {
              this.end_path = this.x + 300
            }
          }
        }
      }

      update = () => {
        //if (game.isGameStop) return;
        if(this.isEat) {
          this.eat()
        } else {
          this.move_rat()
        }
        game.ctx.save()
        if (rat.direct === 'left') {
          game.ctx.translate(this.x * game.ks + this.width * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks * -1, game.ks);
        } else {
          game.ctx.translate(this.x * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks, game.ks);
        }
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore()
      }
    }


    class Gifts extends Sprite {
      constructor() {
        super();
        this.name = '';
        this.sprite = null;
        this.step = 4;
        this.isActive = false;
        this.hide_delay_counter = 0;
        this.fall_end_y = 0;
        this.isBang = false
      }

      start_new() {
        setTimeout(() => {
          this.name = game.gifts_images[Math.round(Math.random() * (game.gifts_images.length - 1))]
          this.name = 'cake'
          this.sprite = game.images[this.name].sprite;

          this.x = Math.random() * game.width_default;
          this.y = 0
          this.isActive = true;
          this.width = this.sprite.width;
          this.height = this.sprite.height;
          if (this.name !== 'bomb') {
            this.fall_end_y = Math.random() * game.height_default - this.height;
          } else {
            this.fall_end_y = game.height_default - this.height;
          }
          //this.fall_end_y = game.height_default - this.height + nyama.height;

        }, Math.random() * 5000);
      }

      fall = () => {
        if (this.y < this.fall_end_y) {
          this.y += this.step * game.levels[game.level];
          const gift_x = this.x + this.width / 2;
          const gift_y = this.y + this.height / 2;
          const nyama_x = nyama.x + nyama.width / 2;
          const nyama_y = nyama.y + nyama.height / 2;

          if ((Math.abs(gift_x - nyama_x) < this.width / 2)
            && (Math.abs(gift_y - nyama_y) < this.height / 2)
            && ((gift_x - nyama_x < 0 && nyama.direct === 'left')
              || (gift_x - nyama_x > 0 && nyama.direct === 'right')
              || Math.abs(gift_x - nyama_x) < 10)) {
            this.isActive = false;
            this.start_new();
            if (this.name === 'cake' || this.name === 'candy_green') {
              nyama.eat_good();
            } else if (this.name === 'candy_red') {
              nyama.eat_bad();
            } else if (this.name === 'brick') {
              nyama.brick();
            } else {
              nyama.bang();
            }

          }

        } else {
          if (this.isActive) {
            if (this.name !== 'bomb') {
              this.sprite = game.images['gift_hide'].sprite;
              this.hide_delay_counter++;
              if (this.hide_delay_counter === 20) {
                this.isActive = false;
                this.hide_delay_counter = 0
                this.start_new()
              }
            } else {
              this.bang()
              const gift_x = this.x + this.width / 2;
              const gift_y = this.y + this.height / 2;
              const nyama_x = nyama.x + nyama.width / 2;
              const nyama_y = nyama.y + nyama.height / 2;
              if ((Math.abs(gift_x - nyama_x) < this.width * 2)
                && (Math.abs(gift_y - nyama_y) < this.height * 2)) {
                if (gift_x - nyama_x < 0) {

                  nyama.isFly_right = true;
                  nyama.bang_fly_right()

                } else {
                  nyama.isFly_left = true;
                  nyama.bang_fly_left()
                }

              }
            }
          }
        }
      }

      bang = () => {
        this.hide_delay_counter++;
        if (!this.isBang) {
          this.y -= 100;
          this.sprite = game.images['bang_image'].sprite;
          this.isBang = true
          game.sounds[0].sound.play()
        }
        if (this.hide_delay_counter === 20) {
          this.isBang = false
          this.isActive = false
          this.hide_delay_counter = 0
          this.start_new()
        }
      }

      update = () => {
        if (game.isGameStop) return;

        game.ctx.save();
        game.ctx.translate(this.x * game.ks, this.y * game.ks);
        game.ctx.scale(game.ks, game.ks);
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore();
      }


    }


    class Buttons {
      constructor(text, size) {

        game.ctx.font = (size) + "px arial black"
        this.size = size
        this.text = text;
        this.x = 0;
        this.y = 0;
      }
      get width() {
        game.ctx.font = this.size * game.ks + "px sans-serif"
        return game.ctx.measureText(this.text).width;
      }
      get height() {
        return this.size * game.ks;
      }

      get left() {
        return this.x;
      }

      get right() {
        return this.left + this.width;
      }

      get top() {
        return this.y - this.height;
      }

      get bottom() {
        return this.y;
      }

      drawGameWinButtons = () => {
        game.ctx.save();
        game.ctx.textAlign = "left"
        game.ctx.font = this.size * game.ks + "px sans-serif"
        button_out.x = (game.width - (this.width + button_out.width + 60)) / 2
        button_out.y = (game.height - this.height) / 2 + 120 * game.ks;
        game.ctx.fillStyle = "darkgreen"
        game.ctx.fillText(button_out.text, button_out.x, button_out.y);
        this.x = button_out.x + button_out.width + 60;
        this.y = button_out.y
        game.ctx.fillText(this.text, this.x, this.y);
        button_next.x = (game.width - this.width) / 2
        button_next.y = (game.height - this.height) / 2 + 180 * game.ks
        game.ctx.fillText(button_next.text, button_next.x, button_next.y);
        game.ctx.restore();
      }

      drawGameOverButtons = () => {
        game.ctx.save();
        game.ctx.textAlign = "left"
        game.ctx.font = this.size * game.ks + "px sans-serif"
        button_out.x = (game.width - (this.width + button_out.width + 60)) / 2
        button_out.y = (game.height - this.height) / 2 + 120 * game.ks;
        game.ctx.fillStyle = "darkgreen"
        game.ctx.fillText(button_out.text, button_out.x, button_out.y);
        this.x = button_out.x + button_out.width + 60;
        this.y = button_out.y
        game.ctx.fillText(this.text, this.x, this.y);
        game.ctx.restore();
      }



      isClickInButton = (x, y) => {
        return x > this.left && x < this.right && y > this.top && y < this.bottom
      }


    }



    class Game {
      constructor() {
        this.live_counter_defult = 4.5
        this.live_counter = this.live_counter_defult
        this.canvas = document.getElementsByTagName('canvas')[0];
        this.ctx = this.canvas.getContext('2d');
        this.width = canvas.width;
        this.height = canvas.height;
        this.isGamePlay = false
        this.isGameStop = false
        this.level = 1

        this.width_default = this.width;
        this.height_default = this.height;
        this.k = this.height / this.width;
        this.ks = 1;

        this.images = {
          bg: { name: 'bg', src: 'assets/images/bg.jpg' },
          nyama: { name: 'nyama', src: 'assets/images/nyama.png' },
          nyama_bang: { name: 'nyama_bang', src: 'assets/images/nyama_bang.png' },
          nyama_die: { name: 'nyama_die', src: 'assets/images/nyama_die.png' },
          nyama_red: { name: 'nyama_red', src: 'assets/images/nyama_red.png' },
          nyama_die_dn: { name: 'nyama_die_dn ', src: 'assets/images/nyama_die_dn.png' },
          bang_image: { name: 'bang_image', src: 'assets/images/bang.png' },
          nyama_njam: { name: 'nyama_njam', src: 'assets/images/nyama_njam.png' },
          nyama_press: { name: 'nyama_press', src: 'assets/images/nyama_press.png' },
          nyama_jump: { name: 'nyama_jump', src: 'assets/images/nyama_fly.png' },
          gift_hide: { name: 'gift_hide', src: 'assets/images/gift_hide.png' },
          nyama_wall_left: { name: 'nyama_wall_left', src: 'assets/images/nyama_wall_left.png' },
          nyama_wall_right: { name: 'nyama_wall_right', src: 'assets/images/nyama_wall_right.png' },
          nyama_die_up_star: { name: 'nyama_die_up_star', src: 'assets/images/nyama_die_up_star.png' },
          nyama_down_star: { name: 'nyama_down_star', src: 'assets/images/nyama_down_star.png' },
          intro_image: { name: 'intro_image', src: 'assets/images/intro.png' },
          rat_image_l: { name: 'rat_image_l', src: 'assets/images/rat_big_l.png' },
          rat_image_r: { name: 'rat_image_r', src: 'assets/images/rat_big_r.png' },
          rat_die: { name: 'rat_die', src: 'assets/images/rat_die.png' },
          rat_break: { name: 'rat_break', src: 'assets/images/rat_break.png' },
          nyama_blood_1: { name: 'nyama_blood_1', src: 'assets/images/nyama_blood_1.png' },
          nyama_blood_2: { name: 'nyama_blood_2', src: 'assets/images/nyama_blood_2.png' },
          bomb: { name: 'bomb', src: 'assets/images/bomb.png' },
          brick: { name: 'brick', src: 'assets/images/brick.png' },
          cake: { name: 'cake', src: 'assets/images/cake.png' },
          candy_green: { name: 'candy_green', src: 'assets/images/candy_green.png' },
          candy_red: { name: 'candy_red', src: 'assets/images/candy_red.png' },
          button_out: { name: 'button_out', src: 'assets/images/button_out.png' },
          button_repeat: { name: 'button_repeat', src: 'assets/images/button_repeat.png' },
          button_next: { name: 'button_next', src: 'assets/images/button_next.png' }
        };

        this.gifts_images = [
          'bomb', 'brick', 'cake', 'candy_red', 'candy_green'
        ];
        this.gifts_sprites = [];

        this.imagesStillLoading = Object.keys(this.images).length;

        this.levels = [0, 1, 2]

        this.sounds = [
          { name: 'bang_snd', src: 'assets/sounds/bang.mp3' },
          { name: 'wall_fall_snd', src: 'assets/sounds/wall_fall.mp3' },
          { name: 'wall_hit_snd', src: 'assets/sounds/wall_hit.mp3' },
          { name: 'fu_snd ', src: 'assets/sounds/fu.mp3' },
          { name: 'eat_snd', src: 'assets/sounds/eat.mp3' },
          { name: 'boom_dzin_snd', src: 'assets/sounds/boom-dzin.mp3' },
          { name: 'boom_up_down_snd', src: 'assets/sounds/boom-up-down.mp3' },
          { name: 'rat_eat_snd', src: 'assets/sounds/rat_eat.mp3' },
          { name: 'rat_cry_snd', src: 'assets/sounds/rat_cry.mp3' },
        ]
      };


      get center() {
        return {
          x: this.canvas.width / 2,
          y: this.canvas.height / 2,
        }
      }

      loadImages = () => {
        for (const key in this.images) {
          let img = new Image();
          img.addEventListener('load', (event) => {
            this.imagesStillLoading--;
          });
          img.src = this.images[key].src;
          this.images[key].sprite = img;
          this.images[key].name = key;
        }
      }

      loadsounds = () => {
        for (var i = 0; i < this.sounds.length; i++) {
          this.sounds[i].sound = new Audio();
          this.sounds[i].sound.src = this.sounds[i].src;
        }
      }

      resize = () => {
        const h = window.innerHeight;
        const w = window.innerWidth;
        this.width = w;
        this.height = w * this.k;
        if (this.height > h) {
          this.height = h;
          this.width = h / this.k;
        }
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ks = this.width / this.width_default;

      }
      game_win = () => {
        this.isGameStop = true;
        this.ctx.clearRect(0, 0, this.width, this.height)
        this.ctx.save();
        this.ctx.fillStyle = "white"
        this.ctx.strokeStyle = "black"
        this.ctx.lineWidth = 1
        const r = 'GAME WIN'
        this.ctx.textAlign = "center"

        this.ctx.font = (60 * this.ks) + "px arial black"
        this.ctx.fillText(r, this.width / 2, this.height / 2);
        this.ctx.strokeText(r, this.width / 2, this.height / 2);
        this.ctx.restore();

        button_repeat.drawGameWinButtons()
        this.game_clear()
      }



      game_over = () => {
        this.isGameStop = true;
        this.ctx.clearRect(0, 0, this.width, this.height)
        this.ctx.save();
        this.ctx.fillStyle = "white"
        this.ctx.strokeStyle = "black"
        this.ctx.lineWidth = 1
        const r = 'GAME OVER'
        this.ctx.textAlign = "center"

        this.ctx.font = (60 * this.ks) + "px arial black"
        this.ctx.fillText(r, this.width / 2, this.height / 2);
        this.ctx.strokeText(r, this.width / 2, this.height / 2);
        this.ctx.restore();

        button_repeat.drawGameOverButtons()
        this.game_clear()
      }

      drawCounter = () => {
        if (this.live_counter >= 5) {
          this.game_win();
        }
        if (this.live_counter <= 0) {
          this.game_over();
        } else {
          let s = '♥'.repeat(Math.floor(this.live_counter))
          this.ctx.save();
          this.ctx.shadowBlur = 20;
          this.ctx.shadowColor = "black";
          this.ctx.lineWidth = 3
          this.ctx.fillStyle = "red"
          this.ctx.strokeStyle = "red"
          this.ctx.font = (60 * this.ks) + "px serif"
          this.ctx.fillText(s, 10 * this.ks, 60 * this.ks);

          if (!Number.isInteger(this.live_counter)) {
            s += '♥';
            this.ctx.strokeText(s, 10 * this.k, 60 * this.ks);

          }
          this.ctx.restore();
        }
      };

      game_intro = () => {
        this.name = 'intro_image'
        this.sprite = game.images[this.name].sprite;
        this.ctx.save();
        this.ctx.clearRect(0, 0, this.width, this.height);

        this.ctx.translate((this.width - this.sprite.width * this.ks) / 2, (this.height - this.sprite.height * this.ks) / 2);
        this.ctx.scale(this.ks, this.ks);

        this.ctx.drawImage(this.sprite, 0, 0);
        this.ctx.restore();
      }

      game_clear = () => {
        for (let i = 0; i < this.gifts_sprites.length; i++) {
          this.gifts_sprites[i].isActive = false;
          this.gifts_sprites[i].y = - 200;
        }
      }

      game_init = () => {
        for (let i = 0; i < this.gifts_sprites.length; i++) {
          this.gifts_sprites[i].start_new();
        }
        nyama.x = game.width_default / 2;
        nyama.y = game.height_default - nyama.height;
        this.live_counter = this.live_counter_defult;
      }

      update = () => {
        this.ctx.clearRect(0, 0, this.width, this.height);
        if (this.isGameStop) return;
        if (nyama.is_eat_good) {
          nyama.eat_good();
        }
        if (nyama.is_eat_bad) {
          nyama.eat_bad();
        }
        if (nyama.is_brick) {
          nyama.brick();
        }
        if (nyama.is_bang) {
          nyama.bang();
        }
        nyama.update();
        rat.update();
        this.drawCounter();

        this.gifts_sprites.forEach((item => {

          if (item.isActive) {
            item.update();
          }
        }))
      }



      mainLoop = () => {

        if (this.isGamePlay) {
          events.keyPress = false
          if (!this.isGameStop) {
            if (events.keyLeft) {
              nyama.moveLeft();
            } else if (events.keyRight) {
              nyama.moveRight();
            }
            if (events.keyUp) {
              nyama.moveUp();
            }

            else if (nyama.isJump) {
              nyama.fall();
            }
            if (nyama.isFly_left) {
              nyama.bang_fly_left()
            }

            if (nyama.isFly_right) {
              nyama.bang_fly_right()
            }

            this.gifts_sprites.forEach((item => {

              if (item.isActive && !item.isBang) {
                item.fall();
              } else if (item.isBang) {
                item.bang();
              }

            }))
            this.update();
          } else {
            if (events.click) {
              if (button_out.isClickInButton(events.x, events.y)) {
                this.level = 1
                this.game_init()
                this.isGamePlay = false
              } else if (button_repeat.isClickInButton(events.x, events.y)) {
                this.game_init()
                this.isGameStop = false

              } else if (button_next.isClickInButton(events.x, events.y)) {
                this.level = 2
                this.game_init()
                this.isGameStop = false
              }
              events.click = false;
            }
            this.drawCounter();
          }
        } else {
          if (events.keyPress) {
            events.keyPress = false
            this.isGamePlay = true

          }
          this.game_intro()
        }
        window.setTimeout(game.mainLoop, 1000 / 60);
      }

      start = () => {
        window.addEventListener('resize', (event) => {
          this.resize()
        });

        window.requestAnimationFrame(this.resize);
        for (let i = 0; i < 4; i++) {
          const spr = this.gifts_sprites.push(new Gifts);
        }
        this.game_init();
        this.mainLoop();
      };

    }

    events = new Events;
    window.onkeydown = events.handleKeyDown;
    window.onkeyup = events.handleKeyUp;
    window.onclick = events.handleClick;

    game = new Game;
    game.loadImages();
    game.loadsounds();

    window.onload = function () {
      nyama = new Nyama;
      rat = new Rat;
      button_out = new Buttons('выход', 50);
      button_next = new Buttons('продолжить', 50);
      button_repeat = new Buttons('повторить', 50);
      game.start();
    }

  </script>
</body>

</html>
