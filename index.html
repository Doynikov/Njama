<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <style>
    body {
      background-color: black;
    }

    #canvas-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      background-image: url('assets/images/bg.jpg');
      background-size: contain;
    }
  </style>
</head>

<body>
  <div id="canvas-wrapper">
    <canvas id="canvas" width="1300" height="731"></canvas>
  </div>
  <script type="text/javascript">

    class Events {
      constructor() {
        this.keyPress = false;
        this.keyUp = false;
        this.keyLeft = false;
        this.keyRight = false;
        this.click = false;
        this.x = 0;
        this.y = 0;
      }

      handleClick = (e) => {
        this.click = true;
        this.x = e.x - game.canvas.offsetLeft;
        this.y = e.y - game.canvas.offsetTop;
      }

      handleKeyDown = (e) => {
        this.keyPress = true
        const code = e.keyCode;
        switch (code) {
          case 38:
            if (!nyama.is_fall) {
              this.keyUp = true;
            }
            break;
          case 37:
            this.keyLeft = true;
            break;
          case 39:
            this.keyRight = true;
            break;
        }
      }

      handleKeyUp = (e) => {
        const code = e.keyCode;
        switch (code) {
          case 38:
            this.keyUp = false;
            break;
          case 37:
            this.keyLeft = false;
            break;
          case 39:
            this.keyRight = false;
            break;
        }
      }
    }

     class Sprite {
      constructor() {
        this.x = 0;
        this.y = 0;
        this.sprite = null;
        this.name = '';
      }

      get width() {
        return this.sprite.width
      }

      get height() {
        return this.sprite.height
      }

      get bottom() {
        return this.y + this.height;
      }

      get right() {
        return this.x + this.width;
      }

      get center() {
        return {
          x: this.x + this.width / 2,
          y: this.y + this.height / 2,          
        }
      }

      toBottomScreen = () => {
        this.y = game.height_default - this.height;
      }

      toRightScreen = () => {
        this.x = game.width_default - this.width;
      }

      toLeftScreen = () => {
        this.x = 0;
      }

      setSprite = (name) => {
        this.name = name
        this.sprite = game.images[this.name].sprite
      }
    }

    class Nyama extends Sprite {
      constructor() {
        super();
        this.setSprite('nyama');
        this.x = game.width_default / 2;
        this.y = game.height_default - this.height;
        this.step_go = 10;
        this.step_jump = 5;
        this.step_fall = 20
        this.step_fly = 20
        this.direct = 'left';
        this.is_jump = false;
        this.is_fall = false;
        this.is_fall_die = false;
        this.is_fly_left = false
        this.is_fly_right = false
        this.is_eat_good = false;
        this.is_eat_bad = false;
        this.is_brick = false;
        this.is_bang = false;
        this.is_active = true;
        this.is_busy = false;       
        this.jump_delay_counter = 0;
        this.eat_good_delay_counter = 0;
        this.eat_bad_delay_counter = 0;
        this.brick_delay_counter = 0;
        this.bang_delay_counter = 0;
        this.fly_delay_counter = 0;
        this.fly_counter = 0;
        this.fly_counter_max = 5;
      }

      moveLeft = () => {
        if (!this.is_active) return;
        this.direct = 'left'
        if (this.x > 0) {
          this.x -= this.step_go;
        }
      }

      moveRight = () => {
        if (!this.is_active) return;
        this.direct = 'right'
        if (this.right < game.width_default) {
          this.x += this.step_go;
        } else {
          this.toRightScreen();
        }
      }

      Jump = () => {
        if (!this.is_active) return;
        if (this.is_fall) return;
        this.jump_delay_counter++
        if (!this.is_jump) {
          this.is_jump = true;
          this.setSprite('nyama_press');
        }
        if (this.jump_delay_counter === 10) {
          this.setSprite('nyama_jump');
        }
        if (this.jump_delay_counter > 10) {
          
          if (this.y > 0) {
            this.y -= this.step_jump;
          } else {
            this.is_fall = true
            this.is_fall_die= true
            this.jump_delay_counter = 0
            events.keyUp = false
            this.setSprite('nyama_die_up_star');
            game.soundPlay(6)
          } 
        }
      }

      moveUp = () => {
        if (this.is_fall) return;
        this.Jump()
      }

      fall = () => {
        if (this.center.x > rat.x && this.center.x < rat.right &&
          this.bottom > rat.y &&
          !rat.is_shlepok_rat) {
            rat.shlepokRat()
        }
        if (!this.is_active) return
        this.is_fall = true
        this.jump_delay_counter = 0
        if (this.y < game.height_default - this.height) {
          this.y += this.step_fall;
        } else {
          this.is_jump = false
          if (!this.is_busy) {
            this.setNormal();
            game.soundsStop()
          }
          this.is_fall = false
          this.y = game.height_default - this.height;
          if (this.is_fallDie) {
            game.live_counter -= 0.5;
            this.is_fall_die= false;
          }
        }
      }

      update = () => {
        if (game.is_game_stop) return;
        game.ctx.save();
        if (nyama.direct === 'right') {
          game.ctx.translate(this.x * game.ks + this.width * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks * -1, game.ks);
        } else {
          game.ctx.translate(this.x * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks, game.ks);
        }
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore();
      }

      setNormal = () => {
        this.setSprite('nyama');
      }

      eatGood = () => { 
        if (!this.is_active) return       
        this.eat_good_delay_counter++;
        if (!this.is_eat_good) {
          this.is_eat_good = true;
          this.is_busy = true;
          this.setSprite('nyama_njam');
          game.soundPlay(4)
        }
        if (this.eat_good_delay_counter > 300) {
          this.is_eat_good = false;
          this.is_busy = false
          game.live_counter += 0.5
          this.eat_good_delay_counter = 0;
          this.setNormal()
        }
      }

      eatBad = () => {       
        if (!this.is_active) return 
        this.eat_bad_delay_counter++;
        if (!this.is_eat_bad) {
          this.is_busy = true;
          this.is_eat_bad = true;
          this.setSprite('nyama_red');
          game.soundPlay(3)
        }
        if (this.eat_bad_delay_counter > 50) {
          this.is_eat_bad = false;
          this.is_busy = false
          game.live_counter -= 0.5
          this.eat_bad_delay_counter = 0;
          this.setNormal()
        }
      }

      brick = () => {
        if (!this.is_active) return
        this.brick_delay_counter++;
        if (!this.is_brick) {
          this.is_busy = true;
          this.is_brick = true;
          this.setSprite('nyama_down_star');
          game.soundPlay(5)
        }
        if (this.brick_delay_counter > 50) {
          this.is_brick = false;
          this.is_busy = false
          game.live_counter -= 0.5
          this.brick_delay_counter = 0;
          this.setNormal()
        }
      }

      bang = () => {            
        this.bang_delay_counter++;
        if (!this.is_bang) {
          this.is_active = false
          this.is_busy = true;
          this.is_bang = true;
          this.setSprite('bang_image');
          game.soundPlay(0)
        }
        if (this.bang_delay_counter > 20) {
          this.setSprite('nyama_bang');
          if (this.bang_delay_counter > 30) {
            this.y = game.height_default - this.height - 2;
            this.setSprite('nyama_die');
            if (this.bang_delay_counter > 300) {
              this.is_bang = false;
              this.is_busy = false;
              this.is_active = true
              game.live_counter--
              this.setNormal();
              this.bang_delay_counter = 0;
            }
          }
        }
      }

      bangFlyLeft = () => {
        if (this.x > 0) {
          game.soundPlay(1)
          this.is_active = false
          this.y -= this.step_fly * 0.5
          this.x -= this.step_fly
        } else {
          if (!this.is_wall_left) {
            this.direct = 'left'
            game.soundPlay(2)
            this.is_wall_left = true
            this.toLeftScreen();
            this.setSprite('nyama_wall_left');
          }
          if (this.bottom < game.height_default) {
            game.soundsStop()
            this.y += 5;
          } else {
            this.is_fly_left = false;
            this.is_wall_left = false;
            this.is_active = true
            game.live_counter -= 0.5
            this.setNormal();
            this.toBottomScreen();
          }
        }
      }

      bangFlyRight = () => {
        if (this.right < game.width_default) {
          game.soundPlay(1)
          this.is_active = false
          this.y -= this.step_fly * 0.5
          this.x += this.step_fly
        } else {
          if (!this.is_wall_right) {
            this.toRightScreen();
            this.direct = 'left'
            game.soundPlay(2)
            this.is_wall_right = true
            this.setSprite('nyama_wall_right');
          }
          if (this.bottom < game.height_default) {
            this.y += 5;
          } else {
            this.is_fly_right = false;
            this.is_wall_right = false;
            this.is_active = true
            game.live_counter -= 0.5
            this.setNormal();
            this.toBottomScreen();
          }
        }
      }
      angel = () => {        
        this.fly_counter ++
        if (this.fly_counter === this.fly_counter_max) {
          this.fly_counter = 0          
          if (this.name === 'angel80') {
            this.setSprite('angel80_3')
          } else {
            this.setSprite('angel80')    
          }        
        }
      }
    }

    class Rat extends Sprite {
      constructor() {
        super();
        this.setSprite('rat_image_l')
        this.step_go = 5
        this.direct = 'right'
        this.is_active = true
        this.is_eat = false
        this.toBottomScreen()
        this.x = 0
        this.step_counter = 0;
        this.step_counter_max = 15;
        this.end_path = game.width_default
        this.eat_counter = 0;
        this.is_boom_rat = false
        this.boom_counter = 0;
        this.is_shlepok_rat = false
        this.shlepok_counter = 0
      }

      shlepokRat = () => {        
        this.shlepok_counter++
        if (!this.is_shlepok_rat) {
          this.is_shlepok_rat = true
          this.setSprite('rat_die')
          this.is_active = false        
        }
        if (this.shlepok_counter === 60) {
          this.is_shlepok_rat = false
          this.shlepok_counter = 0
          this.is_active = true
          this.x = -1000
          this.setSprite('rat_image_l')
        }
      }

      boomRat = () => {
        this.boom_counter++
        if (!this.is_boom_rat) {
          this.is_boom_rat = true;
          this.setSprite('rat_break')
          this.is_active = false
        }
        if (this.boom_counter === 20) {
          this.is_boom_rat = false
          this.boom_counter = 0
          this.is_active = true
          this.x = -1000
          this.setSprite('rat_image_l')
        }
      }

      eat = () => {
        this.eat_counter++
        nyama.is_active = false;        
        if (this.eat_counter === 1) {
          nyama.toBottomScreen()
          game.soundPlay(7)
          nyama.setSprite('nyama_blood_1')
        } else if (this.eat_counter === 20) {
          nyama.setSprite('nyama_blood_2')
        } else if (this.eat_counter === 50) {    
          nyama.x -= 20    
          game.soundPlay(10)              
          this.setSprite('rat_defecate')
        } else if (this.eat_counter > 50) {            
          nyama.y -= 5     
          nyama.angel()               
        }
        if (nyama.y < -100) {          
          this.eat_counter = 0
          this.is_eat = false
          game.live_counter -= 1
          this.setSprite('rat_image_l')
          game.soundsStop()
          setTimeout(() => {
            nyama.toBottomScreen()
            nyama.setNormal()
            nyama.is_active = true            
          }, 2000)        
        }
      }

      moveRat = () => {
        if (!this.is_active) return;
        this.step_counter++
        if (this.step_counter === this.step_counter_max) {
          this.step_counter = 0
          if (this.name === 'rat_image_l') {
            this.setSprite('rat_image_r')
          } else {
            this.setSprite('rat_image_l')
          }
        }

        if (this.direct === 'right') {
          if (this.right < this.end_path 
            && ((nyama.x - this.x) > -250 || nyama.bottom < game.height_default - 60) 
          ) {
            this.x += this.step_go;
            if (this.right - nyama.x > 40 && this.right - nyama.x < 100 && nyama.bottom > game.height_default - 60) {
              this.is_eat = true
              return;
            }
          } else if (nyama.right < this.x || !nyama.is_active) { 
            this.direct = 'left'
            this.end_path = 0
            if ((this.x - this.end_path) < 100) { 
              this.end_path = this.x - 300
            }
          }
        } else {
          if (
            this.x > 0 
            && (this.x - nyama.right > -250 || nyama.bottom < game.height_default - 60)  
          ) {
            this.x -= this.step_go;
            if (this.x - nyama.right < -40 && this.x - nyama.right > -100 && nyama.bottom > game.height_default - 60) {
              this.is_eat = true
              return;
            }
          } else if (this.right < nyama.x || !nyama.is_active) { 
            this.direct = 'right'
            this.end_path = game.width_default
            if ((this.end_path - this.x) < 100) {
              this.end_path = this.x + 300
            }
          }
        }
      }

      update = () => {        
        if (this.is_eat) {
          this.eat()
        } else if (this.is_boom_rat) {
          this.boomRat()
        } else if (this.is_shlepok_rat) {
          this.shlepokRat()
        } else {
          this.moveRat()
        }
        game.ctx.save()
        if (rat.direct === 'left') {
          game.ctx.translate(this.x * game.ks + this.width * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks * -1, game.ks);
        } else {
          game.ctx.translate(this.x * game.ks, this.y * game.ks);
          game.ctx.scale(game.ks, game.ks);
        }
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore()
      }
    }

    class Gifts extends Sprite {
      constructor() {
        super();
        this.setSprite('bomb')
        this.step = 4;
        this.is_active = false;
        this.hide_delay_counter = 0;
        this.fall_end_y = 0;
        this.is_bang = false
      }

      startNew() {
        setTimeout(() => {
          this.setSprite(game.gifts_images[Math.round(Math.random() * (game.gifts_images.length - 1))])
          this.x = Math.random() * game.width_default;
          this.y = 0
          this.is_active = true;
          if (this.name !== 'bomb') {
            this.fall_end_y = Math.random() * game.height_default - this.height;
          } else {
            this.fall_end_y = game.height_default - this.height;
          }
        }, Math.random() * 5000);
      };

      fall = () => {
        if (this.y < this.fall_end_y) {
          this.y += this.step * game.levels[game.level];
          const gift_x = this.x + this.width / 2;
          const gift_y = this.y + this.height / 2;
          const nyama_x = nyama.x + nyama.width / 2;
          const nyama_y = nyama.y + nyama.height / 2;
          const rat_y = rat.y + rat.hight / 2;
          const gift_bottom = this.bottom

          if (this.name === 'bomb'
            && gift_x > rat.x && gift_x < rat.right
            && this.bottom > rat.y
            && !rat.is_boom_rat) {
            rat.boomRat();
          }
          if ((Math.abs(gift_x - nyama_x) < this.width / 2)
            && (Math.abs(gift_y - nyama_y) < this.height / 2)
            && ((gift_x - nyama_x < 0 && nyama.direct === 'left')
              || (gift_x - nyama_x > 0 && nyama.direct === 'right')
              || Math.abs(gift_x - nyama_x) < 10)) {
            this.is_active = false;
            this.startNew();
            if (this.name === 'cake' || this.name === 'candy_green') {
              nyama.eatGood();
            } else if (this.name === 'candy_red') {
              nyama.eatBad();
            } else if (this.name === 'brick') {
              nyama.brick();
            } else {
              nyama.bang();
            }
          }

        } else {
          if (this.is_active) {
            if (this.name !== 'bomb') {
              this.sprite = game.images['gift_hide'].sprite;
              this.hide_delay_counter++;
              if (this.hide_delay_counter === 20) {
                this.is_active = false;
                this.hide_delay_counter = 0
                this.startNew()
              }
            } else {
              const gift_width = this.width
              const gift_height = this.height
              const gift_x = this.x + this.width / 2;
              const gift_y = this.y + this.height / 2;
              const nyama_x = nyama.x + nyama.width / 2;
              const nyama_y = nyama.y + nyama.height / 2;
              this.bang()          
              if ((Math.abs(gift_x - nyama_x) < gift_width * 2)
                && (Math.abs(gift_y - nyama_y) < gift_height * 2)) {
                if (gift_x - nyama_x < 0) {
                  nyama.is_fly_right = true;
                  nyama.bangFlyRight()
                } else {
                  nyama.is_fly_left = true;
                  nyama.bangFlyLeft()
                }
              }
            }
          }
        }
      }

      bang = () => {
        this.hide_delay_counter++;
        if (!this.is_bang) {
          this.y -= 100;
          this.sprite = game.images['bang_image'].sprite;
          this.is_bang = true
          game.soundPlay(0)
        }
        if (this.hide_delay_counter === 20) {
          this.is_bang = false
          this.is_active = false
          this.hide_delay_counter = 0
          this.startNew()
        }
      }

      update = () => {
        if (game.is_game_stop) return;
        game.ctx.save();
        game.ctx.translate(this.x * game.ks, this.y * game.ks);
        game.ctx.scale(game.ks, game.ks);
        game.ctx.drawImage(this.sprite, 0, 0);
        game.ctx.restore();
      }
    }

    class Buttons {
      constructor(text, size) {

        game.ctx.font = (size) + "px arial black"
        this.size = size
        this.text = text;
        this.x = 0;
        this.y = 0;
      }
      get width() {
        game.ctx.font = this.size * game.ks + "px sans-serif"
        return game.ctx.measureText(this.text).width;
      }
      get height() {
        return this.size * game.ks;
      }

      get left() {
        return this.x;
      }

      get right() {
        return this.left + this.width;
      }

      get top() {
        return this.y - this.height;
      }

      get bottom() {
        return this.y;
      }

      drawGameWinButtons = () => {
        game.ctx.save();
        game.ctx.textAlign = "left"
        game.ctx.font = this.size * game.ks + "px sans-serif"
        button_out.x = (game.width - (this.width + button_out.width + 60)) / 2
        button_out.y = (game.height - this.height) / 2 + 120 * game.ks;
        game.ctx.fillStyle = "darkgreen"
        game.ctx.fillText(button_out.text, button_out.x, button_out.y);
        this.x = button_out.x + button_out.width + 60;
        this.y = button_out.y
        game.ctx.fillText(this.text, this.x, this.y);
        if (game.level === 1) {
          button_next.x = (game.width - this.width) / 2
          button_next.y = (game.height - this.height) / 2 + 180 * game.ks
          game.ctx.fillText(button_next.text, button_next.x, button_next.y);
        }        
        game.ctx.restore();
      }

      drawGameOverButtons = () => {
        game.ctx.save();
        game.ctx.textAlign = "left"
        game.ctx.font = this.size * game.ks + "px sans-serif"
        button_out.x = (game.width - (this.width + button_out.width + 60)) / 2
        button_out.y = (game.height - this.height) / 2 + 120 * game.ks;
        game.ctx.fillStyle = "darkgreen"
        game.ctx.fillText(button_out.text, button_out.x, button_out.y);
        this.x = button_out.x + button_out.width + 60;
        this.y = button_out.y
        game.ctx.fillText(this.text, this.x, this.y);
        game.ctx.restore();
      }

      isClickInButton = (x, y) => {
        return x > this.left && x < this.right && y > this.top && y < this.bottom
      }
    }



    class Game {
      constructor() {
        this.live_counter_max = 10
        this.live_counter_defult = 5
        this.live_counter = this.live_counter_defult
        this.canvas = document.getElementsByTagName('canvas')[0];
        this.ctx = this.canvas.getContext('2d');
        this.width = canvas.width;
        this.height = canvas.height;
        this.is_game_play = false
        this.is_game_stop = false
        this.level = 1
        this.width_default = this.width;
        this.height_default = this.height;
        this.k = this.height / this.width;
        this.ks = 1;

        this.images = {
          bg: { name: 'bg', src: 'assets/images/bg.jpg' },
          nyama: { name: 'nyama', src: 'assets/images/nyama.png' },
          angel80: {name: 'angel80', src: 'assets/images/angel80.png' },
          angel80_3: {name: 'angel80_3', src: 'assets/images/angel80_3.png' },
          angel80_2: {name: 'angel80_2', src: 'assets/images/angel80_2.png' },
          nyama_bang: { name: 'nyama_bang', src: 'assets/images/nyama_bang.png' },
          nyama_die: { name: 'nyama_die', src: 'assets/images/nyama_die.png' },
          nyama_red: { name: 'nyama_red', src: 'assets/images/nyama_red.png' },
          nyama_die_dn: { name: 'nyama_die_dn ', src: 'assets/images/nyama_die_dn.png' },
          bang_image: { name: 'bang_image', src: 'assets/images/bang.png' },
          nyama_njam: { name: 'nyama_njam', src: 'assets/images/nyama_njam.png' },
          nyama_press: { name: 'nyama_press', src: 'assets/images/nyama_press.png' },
          nyama_jump: { name: 'nyama_jump', src: 'assets/images/nyama_fly.png' },
          gift_hide: { name: 'gift_hide', src: 'assets/images/gift_hide.png' },
          nyama_wall_left: { name: 'nyama_wall_left', src: 'assets/images/nyama_wall_left.png' },
          nyama_wall_right: { name: 'nyama_wall_right', src: 'assets/images/nyama_wall_right.png' },
          nyama_die_up_star: { name: 'nyama_die_up_star', src: 'assets/images/nyama_die_up_star.png' },
          nyama_down_star: { name: 'nyama_down_star', src: 'assets/images/nyama_down_star.png' },
          intro_image: { name: 'intro_image', src: 'assets/images/intro.png' },
          rat_image_l: { name: 'rat_image_l', src: 'assets/images/rat_big_l.png' },
          rat_image_r: { name: 'rat_image_r', src: 'assets/images/rat_big_r.png' },
          rat_die: { name: 'rat_die', src: 'assets/images/rat_die.png' },
          rat_defecate: { name: 'rat_defecate', src: 'assets/images/rat_defecate.png' },
          rat_break: { name: 'rat_break', src: 'assets/images/rat_break.png' },
          nyama_blood_1: { name: 'nyama_blood_1', src: 'assets/images/nyama_blood_1.png' },
          nyama_blood_2: { name: 'nyama_blood_2', src: 'assets/images/nyama_blood_2.png' },
          bomb: { name: 'bomb', src: 'assets/images/bomb.png' },
          brick: { name: 'brick', src: 'assets/images/brick.png' },
          cake: { name: 'cake', src: 'assets/images/cake.png' },
          candy_green: { name: 'candy_green', src: 'assets/images/candy_green.png' },
          candy_red: { name: 'candy_red', src: 'assets/images/candy_red.png' },
          button_out: { name: 'button_out', src: 'assets/images/button_out.png' },
          button_repeat: { name: 'button_repeat', src: 'assets/images/button_repeat.png' },
          button_next: { name: 'button_next', src: 'assets/images/button_next.png' }
        };

        this.gifts_images = [
          'bomb', 'brick', 'cake', 'candy_red', 'candy_green'
        ];
        this.gifts_sprites = [];
       
        this.levels = [0, 1, 2]

        this.sounds = [
          { name: 'bang_snd', src: 'assets/sounds/bang.mp3' },          
          { name: 'wall_fall_snd', src: 'assets/sounds/wall_fall.mp3' },
          { name: 'wall_hit_snd', src: 'assets/sounds/wall_hit.mp3' },
          { name: 'fu_snd ', src: 'assets/sounds/fu.mp3' },
          { name: 'eat_snd', src: 'assets/sounds/eat.mp3' },
          { name: 'boom_dzin_snd', src: 'assets/sounds/boom-dzin.mp3' },
          { name: 'boom_up_down_snd', src: 'assets/sounds/boom-up-down.mp3' },
          { name: 'rat_eat_snd', src: 'assets/sounds/rat_eat.mp3' },
          { name: 'rat_cry_snd', src: 'assets/sounds/rat_cry.mp3' },
          { name: 'angel_snd_allilua', src: 'assets/sounds/angel2.mp3' },
          { name: 'angel_snd', src: 'assets/sounds/angel3.mp3' },
        ]
      };

      get center() {
        return {
          x: this.canvas.width / 2,
          y: this.canvas.height / 2,
        }
      }

      loadImages = () => {
        for (const key in this.images) {
          let img = new Image();
          img.src = this.images[key].src;
          this.images[key].sprite = img;
          //this.images[key].name = key;
          
        }
      }

      loadsounds = () => {
        this.sounds.forEach(item => {
          item.sound = new Audio();
          item.sound.src = item.src;
        })
      }

      resize = () => {
        const h = window.innerHeight;
        const w = window.innerWidth;
        this.width = w;
        this.height = w * this.k;
        if (this.height > h) {
          this.height = h;
          this.width = h / this.k;
        }

        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ks = this.width / this.width_default;

      }
      gameWin = () => {
        this.is_game_stop = true;
        this.ctx.clearRect(0, 0, this.width, this.height)
        this.ctx.save();
        this.ctx.fillStyle = "white"
        this.ctx.strokeStyle = "black"
        this.ctx.lineWidth = 1
        const r = 'GAME WIN'
        this.ctx.textAlign = "center"
        this.ctx.font = (60 * this.ks) + "px arial black"
        this.ctx.fillText(r, this.width / 2, this.height / 2);
        this.ctx.strokeText(r, this.width / 2, this.height / 2);
        this.ctx.restore();
        button_repeat.drawGameWinButtons()
        this.gameClear()
      }

      gameOver = () => {
        this.is_game_stop = true;
        this.ctx.clearRect(0, 0, this.width, this.height)
        this.ctx.save();
        this.ctx.fillStyle = "white"
        this.ctx.strokeStyle = "black"
        this.ctx.lineWidth = 1
        const r = 'GAME OVER'
        this.ctx.textAlign = "center"

        this.ctx.font = (60 * this.ks) + "px arial black"
        this.ctx.fillText(r, this.width / 2, this.height / 2);
        this.ctx.strokeText(r, this.width / 2, this.height / 2);
        this.ctx.restore();

        button_repeat.drawGameOverButtons()
        this.gameClear()
      }

      drawCounter = () => {
        if (this.live_counter >= this.live_counter_max) {
          this.gameWin();
        } else if (this.live_counter <= 0) {
          this.gameOver();
        } else {
          let s = '♥'.repeat(Math.floor(this.live_counter))
          this.ctx.save();
          this.ctx.shadowBlur = 10;
          this.ctx.shadowColor = 'black';
          this.ctx.lineWidth = 1
          this.ctx.fillStyle = 'red'
          this.ctx.strokeStyle = 'red'
          this.ctx.font = (45 * this.ks) + 'px verdana';
          this.ctx.fillText(s, 15 * this.ks, 50 * this.ks);
          if (!Number.isInteger(this.live_counter)) {
            s += '♥';
            this.ctx.strokeText(s, 15 * this.ks, 50 * this.ks);
          }
          this.ctx.font = (17 * this.ks) + 'px verdana';
          s = `LEVEL ${this.level}`;
          this.ctx.fillStyle = 'white'
          this.ctx.fillText(s, 15 * this.ks, 70 * this.ks);
          this.ctx.restore();
        }
      };

      gameIntro = () => {
        this.name = 'intro_image'
        this.sprite = this.images[this.name].sprite
        this.ctx.save();
        this.ctx.clearRect(0, 0, this.width, this.height);

        this.ctx.translate((this.width - this.sprite.width * this.ks) / 2, (this.height - this.sprite.height * this.ks) / 2);
        this.ctx.scale(this.ks, this.ks);

        this.ctx.drawImage(this.sprite, 0, 0);
        this.ctx.restore();
      }

      gameClear = () => {
        this.gifts_sprites.forEach(item => {
          item.is_active = false
          item.y = - 200
        })
      }

      soundsStop = () => {
        this.sounds.forEach(item => {
          item.sound.pause()
          item.sound.currentTime = 0
        })
      }

      soundPlay = (index) => {
        this.soundsStop()
        this.sounds[index].sound.play()
      }

      gameInit = () => { 
        this.gifts_sprites.forEach(item => {
          item.startNew()
        })  
        nyama.x = game.width_default / 2;
        nyama.y = game.height_default - nyama.height;
        this.live_counter = this.live_counter_defult;
      }

      update = () => {
        this.ctx.clearRect(0, 0, this.width, this.height);
        if (this.is_game_stop) return;
        if (nyama.is_eat_good) {
          nyama.eatGood();
        }
        if (nyama.is_eat_bad) {
          nyama.eatBad();
        }
        if (nyama.is_brick) {
          nyama.brick();
        }
        if (nyama.is_bang) {
          nyama.bang();
        }
        nyama.update();
        if (this.level === 2) {
          rat.update();
        }
        this.drawCounter();
        this.gifts_sprites.forEach((item => {
          if (item.is_active) {
            item.update();
          }
        }))
      }

      mainLoop = () => {
        if (this.is_game_play) {
          if (!this.is_game_stop) {
            events.keyPress = false
            if (events.keyLeft) {
              nyama.moveLeft();
            } else if (events.keyRight) {
              nyama.moveRight();
            }
            if (events.keyUp) {
              nyama.moveUp();
            }
            else if (nyama.is_jump) {
              nyama.fall();
            }
            if (nyama.is_fly_left) {
              nyama.bangFlyLeft()
            }
            if (nyama.is_fly_right) {
              nyama.bangFlyRight()
            }
            this.gifts_sprites.forEach((item => {
              if (item.is_active && !item.is_bang) {
                item.fall();
              } else if (item.is_bang) {
                item.bang();
              }

            }))
            this.update();            
          } else {
            if (events.click) {
              if (button_out.isClickInButton(events.x, events.y)) {
                this.level = 1
                this.gameInit()
                this.is_game_play = false
              } else if (button_repeat.isClickInButton(events.x, events.y)) {
                this.gameInit()
                this.is_game_stop = false
              } else if (button_next.isClickInButton(events.x, events.y)) {
                this.level = 2
                this.gameInit()
                this.is_game_stop = false
              }
              events.click = false;
            }
          }
        } else {
          if (events.keyPress) {
            console.log('events.keyPress');
            events.keyPress = false
            this.is_game_play = true
            this.is_game_stop = false

          }
          this.gameIntro()
        }
        window.setTimeout(game.mainLoop, 1000 / 60);
      }

      start = () => {
        window.addEventListener('resize', (event) => {
          this.resize()
        });
        window.requestAnimationFrame(this.resize);
        for (let i = 0; i < 4; i++) {
          this.gifts_sprites.push(new Gifts);  
        }
        this.gameInit();
        this.mainLoop();
      };
    }

    events = new Events;
    window.onkeydown = events.handleKeyDown;
    window.onkeyup = events.handleKeyUp;
    window.onclick = events.handleClick;

    game = new Game;
    game.loadImages();
    game.loadsounds();

    window.onload = function () {
      nyama = new Nyama;
      rat = new Rat;
      button_out = new Buttons('выход', 50);
      button_next = new Buttons('продолжить', 50);
      button_repeat = new Buttons('повторить', 50);
      game.start();
    }

  </script>
</body>

</html>
