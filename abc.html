<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>title</title>
</head>

<body>
    <div class="controls">
        <audio id="snd" src="А.m4a"></audio>
        <button onclick="speak('г')">Play!!!!!</button>
        <button onclick="start()">Click to Speak</button>
    </div>
</body>
<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const SpeechGrammarList = window.SpeechGrammarList || window.webkitSpeechGrammarList;
    const SpeechRecognitionEvent = window.SpeechRecognitionEvent || window.webkitSpeechRecognitionEvent;

    const recognition = new SpeechRecognition();
    var grammar ="#JSGF V1.0; grammar letters; public <letter> = а | gi | в | г | бо | е | ё  | бе ;";


    recognition.lang = "ru-RU";
    recognition.interimResults = false;
    recognition.maxAlternatives = 20;

    const speechRecognitionList = new SpeechGrammarList();
    speechRecognitionList.addFromString(grammar, 20);
    recognition.grammars = speechRecognitionList;
    console.log(recognition.grammars, 11111);

    recognition.onresult = function (event) {
        if (event.results.length > 0) {
            var result = event.results[0];
            console.log(event.results.length, result.length , 'event.results')

            for (var i = 0; i < result.length; ++i) {
                var text = result[i].transcript;
                console.log(text)
            }
        }
    }

    function start() {
        recognition.start();
    }



    const synth = window.speechSynthesis;


    let voices = []
    let currentVoice;

    function populateVoiceList() {
        // Google русский, Microsoft Irina - Russian (Russia), Microsoft Pavel - Russian (Russia)
        voices = synth.getVoices()
        currentVoice = voices.find(item => item.name === 'Google русский')
        console.log(currentVoice, 'voices')
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function speak(txt) {
        if (synth.speaking) {
            console.error("speechSynthesis.speaking");
            return;
        }

        const utterThis = new SpeechSynthesisUtterance(txt);

        utterThis.onend = function (event) {
            console.log("SpeechSynthesisUtterance.onend");
        };

        utterThis.onerror = function (event) {
            console.error("SpeechSynthesisUtterance.onerror");
        };

        utterThis.voice = currentVoice;
        utterThis.pitch = 0.7;
        utterThis.rate = 1.3;
        synth.speak(utterThis);
    }

    window.onload = function () {
        document.onkeypress = function () {
            document.getElementById('snd').play();
        }
    }


    

</script>

</html>
